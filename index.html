<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>科学计算器</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 计算器主容器 — 自适应安全区域 */
        .calculator {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* 历史面板 (侧滑) */
        .history-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(8px);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
        }

        .history-panel.show {
            transform: translateX(0);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top, 16px));
            border-bottom: 0.5px solid #333;
            flex-shrink: 0;
        }

        .history-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .history-clear, .history-close {
            font-size: 16px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            background: #1c1c1e;
            color: #ff9500;
        }

        .history-clear:active, .history-close:active {
            opacity: 0.7;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .history-item {
            padding: 14px 0;
            border-bottom: 0.5px solid #222;
            cursor: pointer;
            transition: background 0.1s;
        }

        .history-item:active {
            background: #1c1c1e;
        }

        .history-expr {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 6px;
            font-family: monospace;
        }

        .history-result {
            color: #fff;
            font-size: 22px;
            font-weight: 350;
            word-break: break-word;
        }

        .empty-history {
            color: #555;
            text-align: center;
            padding: 40px;
            font-size: 15px;
        }

        /* 显示区域 */
        .display {
            flex: 0 0 auto;
            min-height: 140px;
            padding: 20px 20px 10px 20px;
            padding-top: max(20px, env(safe-area-inset-top, 20px));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .mode-indicator {
            color: #ff9500;
            font-size: 14px;
            font-weight: 600;
            background: #1c1c1e;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .history-btn {
            background: #1c1c1e;
            border-radius: 30px;
            padding: 6px 12px;
            color: #ff9500;
            font-size: 16px;
            cursor: pointer;
        }

        .expression-area {
            text-align: right;
            color: #aaa;
            font-size: 20px;
            min-height: 32px;
            word-break: break-all;
            font-family: monospace;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .current-area {
            text-align: right;
            color: #fff;
            font-size: clamp(36px, 12vw, 64px);
            font-weight: 350;
            word-break: break-word;
            line-height: 1.2;
        }

        /* 键盘滚动容器 (解决底部遮挡) */
        .keyboard-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 0 8px;
            -webkit-overflow-scrolling: touch;
        }

        .keyboard-inner {
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 12px));
        }

        /* 科学按键区域 — 三行按钮整体高度压缩为原来的2/3，椭圆形 */
        .scientific-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;          /* 略微缩小间距，视觉更紧凑 */
            margin-bottom: 12px;
        }

        /* 科学按钮专属样式：高度为宽度的2/3 (原高度压缩) + 椭圆形状 */
        .scientific-grid .btn {
            aspect-ratio: 1 / 0.6667;    /* 高度 = 宽度 * 2/3 */
            border-radius: 50%;          /* 宽高不等时自动形成椭圆 */
            font-size: clamp(0.7rem, 3.5vw, 0.9rem);
            background: #3a3a3c;
            font-weight: 500;
        }

        /* 角度/弧度切换按钮保持高亮风格 */
        .scientific-grid .deg-rad-btn {
            background: #1c1c1e;
            color: #ff9500;
            font-weight: 600;
        }
        .scientific-grid .deg-rad-btn.active {
            background: #ff9500;
            color: #000;
        }

        /* 主键盘区域 */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        /* 通用按钮样式 (主键盘保持正方形) */
        .btn {
            aspect-ratio: 1 / 1;
            border-radius: 60px;
            border: none;
            font-size: 1.7rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s, filter 0.05s;
            background: #2c2c2e;
            color: white;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.94);
            filter: brightness(1.2);
        }

        /* 功能按钮灰色 */
        .btn-func {
            background: #3a3a3c;
            color: #fff;
            font-size: 1.2rem;
        }

        /* 运算符橙色 */
        .btn-operator {
            background: #ff9500;
            color: #fff;
            font-size: 1.9rem;
        }

        /* 等号 */
        .btn-equal {
            background: #ff9500;
        }

        /* 数字 */
        .btn-number {
            background: #2c2c2e;
            font-size: 1.8rem;
        }

        /* 零特殊 */
        .btn-zero {
            grid-column: span 2;
            aspect-ratio: 2 / 1;
            justify-content: flex-start;
            padding-left: 28px;
        }

        /* 横屏 & 小高度优化 (确保科学按钮的椭圆形状依然合理) */
        @media (max-height: 600px) {
            .display {
                min-height: 100px;
                padding: 8px 16px;
            }
            .current-area {
                font-size: clamp(28px, 8vw, 48px);
            }
            .expression-area {
                font-size: 16px;
            }
            .btn {
                font-size: 1.3rem;
            }
            .scientific-grid .btn {
                font-size: clamp(0.65rem, 3vw, 0.8rem);
            }
            .btn-func {
                font-size: 1rem;
            }
        }

        @media (orientation: landscape) and (max-height: 480px) {
            .calculator {
                flex-direction: row;
            }
            .display {
                flex: 0 0 35%;
                justify-content: center;
            }
            .keyboard-scroll {
                flex: 1;
            }
            .scientific-grid {
                gap: 5px;
            }
            .main-grid {
                gap: 6px;
            }
            .scientific-grid .btn {
                aspect-ratio: 1 / 0.7;
            }
        }

        /* 反馈toast */
        .feedback-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.2s;
            z-index: 300;
            pointer-events: none;
            white-space: nowrap;
        }
        .feedback-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- 历史侧边栏 -->
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <span class="history-clear" id="clearHistoryBtn">清除全部</span>
            <span class="history-title">记录</span>
            <span class="history-close" id="closeHistoryBtn">完成</span>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-history">暂无计算历史</div>
        </div>
    </div>

    <!-- 显示区域 -->
    <div class="display">
        <div class="display-header">
            <span class="mode-indicator" id="degRadLabel">DEG</span>
            <span class="history-btn" id="openHistoryBtn">📋 历史</span>
        </div>
        <div class="expression-area" id="expressionDisplay"></div>
        <div class="current-area" id="currentDisplay">0</div>
    </div>

    <!-- 可滚动键盘区 -->
    <div class="keyboard-scroll">
        <div class="keyboard-inner">
            <!-- 科学函数面板 (三行, 按钮已压缩为椭圆) -->
            <div class="scientific-grid" id="scientificGrid">
                <button class="btn deg-rad-btn" id="degRadToggle">DEG</button>
                <button class="btn" data-func="sin">sin</button>
                <button class="btn" data-func="cos">cos</button>
                <button class="btn" data-func="tan">tan</button>
                <button class="btn" data-func="π">π</button>

                <button class="btn" data-func="x²">x²</button>
                <button class="btn" data-func="xⁿ">xⁿ</button>
                <button class="btn" data-func="√">√</button>
                <button class="btn" data-func="ln">ln</button>
                <button class="btn" data-func="log">log</button>

                <button class="btn" data-func="(">(</button>
                <button class="btn" data-func=")">)</button>
                <button class="btn" data-func="1/x">1/x</button>
                <button class="btn" data-func="e">e</button>
                <button class="btn" data-func="n!">n!</button>
            </div>

            <!-- 主键盘 (保持不变) -->
            <div class="main-grid">
                <button class="btn btn-func" id="soundToggleBtn">🔊</button>
                <button class="btn btn-func" id="clearAllBtn">AC</button>
                <button class="btn btn-func" id="deleteBtn">⌫</button>
                <button class="btn btn-operator" data-op="÷">÷</button>

                <button class="btn btn-number" data-num="7">7</button>
                <button class="btn btn-number" data-num="8">8</button>
                <button class="btn btn-number" data-num="9">9</button>
                <button class="btn btn-operator" data-op="×">×</button>

                <button class="btn btn-number" data-num="4">4</button>
                <button class="btn btn-number" data-num="5">5</button>
                <button class="btn btn-number" data-num="6">6</button>
                <button class="btn btn-operator" data-op="-">−</button>

                <button class="btn btn-number" data-num="1">1</button>
                <button class="btn btn-number" data-num="2">2</button>
                <button class="btn btn-number" data-num="3">3</button>
                <button class="btn btn-operator" data-op="+">+</button>

                <button class="btn btn-number btn-zero" data-num="0">0</button>
                <button class="btn btn-number" data-num=".">.</button>
                <button class="btn btn-equal" id="equalBtn">=</button>
            </div>
        </div>
    </div>
</div>

<div class="feedback-toast" id="toastMsg"></div>

<script>
    // ------------------- 全局状态 -------------------
    let expression = "";          // 当前完整表达式字符串
    let lastResult = null;        // 上一次计算结果（用于连续运算）
    let isDegreeMode = true;      // true: DEG, false: RAD
    let soundEnabled = true;
    let historyList = [];

    // DOM 元素
    const expressionDisplay = document.getElementById("expressionDisplay");
    const currentDisplay = document.getElementById("currentDisplay");
    const degRadLabel = document.getElementById("degRadLabel");
    const degRadToggle = document.getElementById("degRadToggle");
    const soundToggleBtn = document.getElementById("soundToggleBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const equalBtn = document.getElementById("equalBtn");
    const historyPanel = document.getElementById("historyPanel");
    const historyListDiv = document.getElementById("historyList");
    const openHistoryBtn = document.getElementById("openHistoryBtn");
    const closeHistoryBtn = document.getElementById("closeHistoryBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const toastMsg = document.getElementById("toastMsg");

    // 音频上下文 (修复PWA无声)
    let audioCtx = null;

    // ------------------- 辅助函数 -------------------
    function showToast(text, duration = 1200) {
        toastMsg.textContent = text;
        toastMsg.classList.add("show");
        setTimeout(() => toastMsg.classList.remove("show"), duration);
    }

    // 震动反馈
    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(8);
    }

    // 点击音效 (每次用户点击按钮时调用)
    async function playClickSound() {
        if (!soundEnabled) return;
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // 关键：如果处于 suspended 状态，必须唤醒
            if (audioCtx.state === "suspended") {
                await audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 820;
            osc.type = "sine";
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.06);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.06);
        } catch(e) { /* 静默失败 */ }
    }

    function buttonFeedback() {
        vibrate();
        playClickSound();
    }

    // 保存历史到 localStorage
    function saveHistory() {
        localStorage.setItem("calc_history_v2", JSON.stringify(historyList.slice(0, 50)));
    }

    function loadHistory() {
        const stored = localStorage.getItem("calc_history_v2");
        if (stored) {
            try {
                historyList = JSON.parse(stored);
            } catch(e) { historyList = []; }
        } else {
            historyList = [];
        }
        renderHistoryPanel();
    }

    function addHistory(expr, resultVal) {
        const resultStr = typeof resultVal === 'number' ? formatNumber(resultVal) : String(resultVal);
        historyList.unshift({
            expr: expr,
            result: resultStr,
            time: Date.now()
        });
        if (historyList.length > 50) historyList.pop();
        saveHistory();
        renderHistoryPanel();
    }

    function renderHistoryPanel() {
        if (!historyListDiv) return;
        if (historyList.length === 0) {
            historyListDiv.innerHTML = '<div class="empty-history">暂无计算历史</div>';
            return;
        }
        historyListDiv.innerHTML = historyList.map((item, idx) => `
            <div class="history-item" data-idx="${idx}">
                <div class="history-expr">${escapeHtml(item.expr)} =</div>
                <div class="history-result">${escapeHtml(item.result)}</div>
            </div>
        `).join('');
        // 绑定点击复用历史结果
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = parseInt(el.dataset.idx);
                if (!isNaN(idx) && historyList[idx]) {
                    buttonFeedback();
                    const pastResult = historyList[idx].result;
                    expression = "";
                    updateExpressionDisplay();
                    setCurrentDisplay(pastResult);
                    lastResult = parseFloat(pastResult);
                    if (isNaN(lastResult)) lastResult = null;
                    closeHistoryPanel();
                }
                e.stopPropagation();
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openHistoryPanel() {
        historyPanel.classList.add("show");
        renderHistoryPanel();
    }
    function closeHistoryPanel() {
        historyPanel.classList.remove("show");
    }
    function clearHistory() {
        if (historyList.length > 0) {
            historyList = [];
            saveHistory();
            renderHistoryPanel();
            showToast("历史已清空");
        } else {
            showToast("暂无历史");
        }
    }

    // 更新表达式显示区
    function updateExpressionDisplay() {
        if (expression === "") {
            expressionDisplay.textContent = "";
        } else {
            let disp = expression.replace(/\*/g, '×').replace(/\//g, '÷');
            expressionDisplay.textContent = disp;
        }
    }

    // 设置当前显示 (底部大数字)
    function setCurrentDisplay(value) {
        if (value === undefined || value === null) value = "0";
        let str = String(value);
        // 美化数字格式
        let num = parseFloat(str);
        if (!isNaN(num) && isFinite(num)) {
            if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-8 && num !== 0)) {
                str = num.toExponential(10);
            } else {
                str = num.toLocaleString('en-US', { maximumFractionDigits: 12 });
                str = str.replace(/,/g, '');
            }
        }
        currentDisplay.textContent = str;
    }

    // 获取当前显示值 (用于运算)
    function getCurrentDisplayValue() {
        let raw = currentDisplay.textContent;
        if (raw === "Error") return NaN;
        let num = parseFloat(raw);
        return isNaN(num) ? 0 : num;
    }

    // 计算表达式 (支持四则运算、括号、幂、科学函数)
    function evaluateExpression(expr, degreeMode) {
        // 预处理: 替换符号, 将 × ÷ 转换为 * / , 将 ^ 转换为 **
        let processed = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
        // 处理 π 和 e
        processed = processed.replace(/π/g, 'Math.PI').replace(/e(?![a-zA-Z0-9_])/g, 'Math.E');
        // 处理科学函数: sin, cos, tan, ln, log, sqrt 等
        // 需要将角度模式下的 sin/cos/tan 进行弧度转换
        if (degreeMode) {
            // 替换 sin( → sin_deg( , 自定义函数处理
            processed = processed.replace(/sin\(/g, 'sin_deg(');
            processed = processed.replace(/cos\(/g, 'cos_deg(');
            processed = processed.replace(/tan\(/g, 'tan_deg(');
        }
        // 其他函数映射
        processed = processed.replace(/ln\(/g, 'Math.log(');
        processed = processed.replace(/log\(/g, 'Math.log10(');
        processed = processed.replace(/√\(/g, 'Math.sqrt(');
        // 处理 x² (平方) 注意后面可能跟数字，转化成平方
        processed = processed.replace(/(\d+(?:\.\d+)?|\))\s*x²/g, '($1)**2');
        processed = processed.replace(/x²/g, '**2');
        // 处理 1/x
        processed = processed.replace(/1\/x\(/g, '1/(');
        // 处理 n! 阶乘
        processed = processed.replace(/(\d+(?:\.\d+)?)!|\(([^)]+)\)!/g, (match, p1, p2) => {
            let num = p1 !== undefined ? parseFloat(p1) : eval(`(${p2})`);
            return factorial(num);
        });

        // 定义角度转弧度辅助函数
        const toRad = (deg) => deg * Math.PI / 180;
        const sin_deg = (x) => Math.sin(toRad(x));
        const cos_deg = (x) => Math.cos(toRad(x));
        const tan_deg = (x) => Math.tan(toRad(x));

        try {
            // 使用 Function 构造器，安全且支持严格模式
            const fn = new Function('Math', 'sin_deg', 'cos_deg', 'tan_deg', 'factorial', `'use strict'; return (${processed})`);
            let result = fn(Math, sin_deg, cos_deg, tan_deg, factorial);
            if (!isFinite(result)) throw new Error("无效结果");
            return result;
        } catch (err) {
            console.warn(err);
            return NaN;
        }
    }

    // 阶乘独立函数
    function factorial(n) {
        if (n < 0 || !Number.isInteger(n)) return NaN;
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    // 格式化最终结果
    function formatNumber(num) {
        if (isNaN(num) || !isFinite(num)) return "Error";
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-8 && num !== 0)) {
            return num.toExponential(10);
        }
        let str = num.toString();
        if (str.length > 16) str = num.toPrecision(12);
        return str;
    }

    // 执行等号逻辑 (完整计算)
    function computeResult() {
        buttonFeedback();
        if (expression.trim() === "") {
            // 如果表达式为空，但当前显示有数值，可将其作为表达式
            let currVal = currentDisplay.textContent;
            if (currVal !== "0" && currVal !== "Error") {
                expression = currVal;
                updateExpressionDisplay();
            } else {
                return;
            }
        }
        let exprToEval = expression;
        try {
            let result = evaluateExpression(exprToEval, isDegreeMode);
            if (isNaN(result) || !isFinite(result)) {
                setCurrentDisplay("Error");
                showToast("表达式无效");
                return;
            }
            let formattedResult = formatNumber(result);
            // 添加到历史记录
            addHistory(exprToEval, result);
            // 显示结果
            setCurrentDisplay(formattedResult);
            // 将当前表达式替换为结果，以便连续运算
            expression = formattedResult;
            updateExpressionDisplay();
            lastResult = result;
        } catch (e) {
            setCurrentDisplay("Error");
            showToast("语法错误");
        }
    }

    // 添加字符到表达式 (数字/运算符/括号)
    function appendToExpression(char) {
        buttonFeedback();
        // 如果当前显示是 Error 且用户输入数字，重置
        if (currentDisplay.textContent === "Error") {
            expression = "";
            setCurrentDisplay("0");
        }
        expression += char;
        updateExpressionDisplay();
        // 实时尝试计算并显示预览（可选）
        try {
            let preview = evaluateExpression(expression, isDegreeMode);
            if (!isNaN(preview) && isFinite(preview)) {
                setCurrentDisplay(formatNumber(preview));
            } else {
                // 如果表达式不完整，保持原有显示不变
            }
        } catch (e) { /* 不处理预览失败 */ }
    }

    // 处理科学函数 (一元)
    function applyFunction(func) {
        buttonFeedback();
        if (func === 'π') {
            appendToExpression('π');
        } else if (func === 'e') {
            appendToExpression('e');
        } else if (func === 'x²') {
            appendToExpression('^2');
        } else if (func === 'xⁿ') {
            appendToExpression('^');
        } else if (func === '√') {
            appendToExpression('√(');
        } else if (func === 'ln') {
            appendToExpression('ln(');
        } else if (func === 'log') {
            appendToExpression('log(');
        } else if (func === '1/x') {
            appendToExpression('1/(');
        } else if (func === 'n!') {
            appendToExpression('!');
        } else if (func === 'sin' || func === 'cos' || func === 'tan') {
            appendToExpression(`${func}(`);
        } else if (func === '(' || func === ')') {
            appendToExpression(func);
        }
    }

    // 清除全部
    function clearAll() {
        buttonFeedback();
        expression = "";
        updateExpressionDisplay();
        setCurrentDisplay("0");
        lastResult = null;
    }

    // 退格
    function deleteLast() {
        buttonFeedback();
        if (expression.length > 0) {
            expression = expression.slice(0, -1);
            updateExpressionDisplay();
            // 重新计算预览
            if (expression === "") {
                setCurrentDisplay("0");
            } else {
                try {
                    let preview = evaluateExpression(expression, isDegreeMode);
                    if (!isNaN(preview) && isFinite(preview)) {
                        setCurrentDisplay(formatNumber(preview));
                    } else {
                        setCurrentDisplay("...");
                    }
                } catch(e) {
                    setCurrentDisplay("...");
                }
            }
        } else {
            setCurrentDisplay("0");
        }
    }

    // 切换角度/弧度
    function toggleDegRad() {
        buttonFeedback();
        isDegreeMode = !isDegreeMode;
        const modeText = isDegreeMode ? "DEG" : "RAD";
        degRadLabel.textContent = modeText;
        degRadToggle.textContent = modeText;
        degRadToggle.classList.toggle("active", isDegreeMode);
        showToast(isDegreeMode ? "角度模式" : "弧度模式");
        // 重新计算当前表达式预览 (更新显示)
        if (expression !== "") {
            try {
                let preview = evaluateExpression(expression, isDegreeMode);
                if (!isNaN(preview) && isFinite(preview)) {
                    setCurrentDisplay(formatNumber(preview));
                }
            } catch(e) {}
        }
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        soundToggleBtn.textContent = soundEnabled ? "🔊" : "🔇";
        showToast(soundEnabled ? "按键音开" : "按键音关");
        if (soundEnabled && audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
        }
    }

    // ------------------- 事件绑定 (委托) -------------------
    function bindEvents() {
        // 数字按钮
        document.querySelectorAll(".btn-number").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                let num = btn.getAttribute("data-num");
                if (num) appendToExpression(num);
            });
        });
        // 运算符
        document.querySelectorAll(".btn-operator").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let op = btn.getAttribute("data-op");
                if (op === "÷") appendToExpression("/");
                else if (op === "×") appendToExpression("*");
                else if (op === "+") appendToExpression("+");
                else if (op === "-") appendToExpression("-");
                else appendToExpression(op);
            });
        });
        // 科学函数
        document.querySelectorAll("[data-func]").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let func = btn.getAttribute("data-func");
                applyFunction(func);
            });
        });
        // 等号
        equalBtn.addEventListener("click", computeResult);
        clearAllBtn.addEventListener("click", clearAll);
        deleteBtn.addEventListener("click", deleteLast);
        soundToggleBtn.addEventListener("click", toggleSound);
        degRadToggle.addEventListener("click", toggleDegRad);
        openHistoryBtn.addEventListener("click", openHistoryPanel);
        closeHistoryBtn.addEventListener("click", closeHistoryPanel);
        clearHistoryBtn.addEventListener("click", clearHistory);
        // 键盘支持
        window.addEventListener("keydown", (e) => {
            const key = e.key;
            if (/[\d\.]/.test(key)) {
                appendToExpression(key);
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                let op = key;
                if (op === '*') appendToExpression('*');
                else if (op === '/') appendToExpression('/');
                else appendToExpression(op);
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                computeResult();
            } else if (key === 'Backspace') {
                deleteLast();
            } else if (key === 'Escape') {
                clearAll();
            } else if (key === '(' || key === ')') {
                appendToExpression(key);
            }
        });
    }

    // 初始化
    function init() {
        loadHistory();
        bindEvents();
        clearAll(); // 初始为0
        setCurrentDisplay("0");
        // 确保音频上下文在首次点击时唤醒，但已由 playClickSound 自动唤醒
        document.body.addEventListener("click", () => {
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        }, { once: true });
    }
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>科学计算器</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .calculator {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* 历史记录面板 */
        .history-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .history-panel.show {
            transform: translateX(0);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            padding-top: max(15px, env(safe-area-inset-top, 15px));
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .history-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .history-close {
            color: #ff9500;
            font-size: 16px;
            cursor: pointer;
            padding: 10px;
        }

        .history-clear {
            color: #ff3b30;
            font-size: 16px;
            cursor: pointer;
            padding: 10px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        .history-expr {
            color: #999;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .history-result {
            color: #fff;
            font-size: 24px;
            font-weight: 300;
        }

        .empty-history {
            color: #666;
            text-align: center;
            padding: 40px;
            font-size: 16px;
        }

        /* 显示区域 */
        .display {
            flex: 0 0 auto;
            min-height: 120px;
            max-height: 22vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 15px;
            padding-top: max(10px, env(safe-area-inset-top, 10px));
            position: relative;
        }

        .display-header {
            position: absolute;
            top: max(10px, env(safe-area-inset-top, 10px));
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .mode-indicator {
            color: #ff9500;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .history-btn {
            color: #ff9500;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .previous-operand {
            color: #999;
            font-size: 20px;
            font-weight: 300;
            min-height: 24px;
            word-break: break-all;
            max-width: 100%;
            text-align: right;
            margin-bottom: 5px;
            margin-top: 40px;
        }

        .current-operand {
            color: #fff;
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 200;
            word-break: break-all;
            max-width: 100%;
            line-height: 1.1;
            text-align: right;
        }

        /* 键盘容器 */
        .keypad-container {
            flex: 0 0 auto;
            padding: 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
            max-height: 78vh;
            display: flex;
            flex-direction: column;
        }

        /* 科学计算键盘 */
        .scientific-keypad {
            flex: 0 0 auto;
            padding-bottom: 6px;
            border-bottom: 1px solid #222;
            margin-bottom: 6px;
        }

        .scientific-keypad .keypad-row {
            margin-bottom: 6px;
            height: auto;
        }

        .scientific-keypad .btn {
            width: 18%;
            height: auto;
            aspect-ratio: 1.3;
            font-size: clamp(13px, 3.5vw, 16px);
        }

        .scientific-keypad .btn.function {
            background: #2c2c2c;
            color: #fff;
        }

        .scientific-keypad .btn.function:active {
            background: #444;
        }

        .btn.deg-rad {
            font-size: clamp(11px, 3vw, 13px) !important;
            font-weight: 600;
        }

        .btn.deg-rad.active {
            background: #ff9500 !important;
            color: #fff !important;
        }

        /* 标准键盘 */
        .keypad {
            flex: 0 0 auto;
            width: 100%;
        }

        .keypad-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            height: auto;
        }

        .keypad-row:last-child {
            margin-bottom: 0;
        }

        .btn {
            width: 23%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: clamp(20px, 5.5vw, 26px);
            font-weight: 400;
            cursor: pointer;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn:active {
            transform: scale(0.92);
            filter: brightness(1.3);
        }

        .btn.function {
            background: #a5a5a5;
            color: #000;
        }

        .btn.function:active {
            background: #d4d4d2;
        }

        .btn.operator {
            background: #ff9500;
            color: #fff;
            font-size: clamp(24px, 6.5vw, 30px);
        }

        .btn.operator:active {
            background: #ffb143;
        }

        .btn.operator.active {
            background: #fff;
            color: #ff9500;
        }

        .btn.number {
            background: #333;
            color: #fff;
        }

        .btn.number:active {
            background: #555;
        }

        .btn.zero {
            width: 48%;
            aspect-ratio: auto;
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 24px;
        }

        /* 设置按钮 */
        .btn.settings-btn {
            background: #1c1c1c;
            color: #666;
            font-size: 18px;
        }

        .btn.settings-btn:active {
            background: #333;
        }

        /* 震动反馈提示 */
        .feedback-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: none;
        }

        .feedback-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 滚动条样式 */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        /* 小屏幕优化 */
        @media (max-height: 700px) {
            .display {
                min-height: 100px;
                max-height: 20vh;
                padding: 10px 12px;
            }

            .previous-operand {
                font-size: 16px;
                margin-top: 35px;
            }

            .current-operand {
                font-size: clamp(26px, 8vw, 44px);
            }

            .keypad-container {
                padding: 6px;
                max-height: 80vh;
            }

            .keypad-row {
                margin-bottom: 5px;
            }

            .scientific-keypad .keypad-row {
                margin-bottom: 5px;
            }

            .btn {
                font-size: clamp(17px, 4.5vw, 22px);
            }

            .scientific-keypad .btn {
                font-size: clamp(11px, 2.8vw, 13px);
                aspect-ratio: 1.2;
            }
        }

        @media (max-height: 600px) {
            .display {
                min-height: 80px;
                max-height: 18vh;
            }

            .current-operand {
                font-size: clamp(22px, 7vw, 36px);
            }

            .scientific-keypad .btn {
                aspect-ratio: 1.1;
            }
        }

        /* 横屏适配 */
        @media (orientation: landscape) and (max-height: 500px) {
            .calculator {
                flex-direction: row;
            }

            .display {
                flex: 0 0 32%;
                min-height: auto;
                max-height: none;
                padding: 10px;
            }

            .keypad-container {
                flex: 1;
                max-height: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 8px;
            }

            .current-operand {
                font-size: clamp(18px, 5vh, 32px);
            }

            .previous-operand {
                font-size: 13px;
                margin-top: 30px;
            }

            .scientific-keypad .btn {
                aspect-ratio: 1.5;
                font-size: clamp(11px, 2.5vh, 14px);
            }

            .btn {
                font-size: clamp(16px, 4vh, 22px);
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="calculator">
        <!-- 历史记录面板 -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span class="history-clear" onclick="clearHistory()">清除全部</span>
                <span class="history-title">计算历史</span>
                <span class="history-close" onclick="toggleHistory()">完成</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">暂无计算历史</div>
            </div>
        </div>

        <!-- 显示区域 -->
        <div class="display">
            <div class="display-header">
                <span class="mode-indicator" id="degRadIndicator">DEG</span>
                <span class="history-btn" onclick="toggleHistory()">🕐</span>
            </div>
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>

        <!-- 键盘容器 -->
        <div class="keypad-container">
            <!-- 科学计算键盘 -->
            <div class="scientific-keypad" id="scientificKeypad">
                <div class="keypad-row">
                    <button class="btn function deg-rad active" onclick="toggleDegRad()" id="degRadBtn">DEG</button>
                    <button class="btn function" onclick="handleScientific('sin')">sin</button>
                    <button class="btn function" onclick="handleScientific('cos')">cos</button>
                    <button class="btn function" onclick="handleScientific('tan')">tan</button>
                    <button class="btn function" onclick="handleScientific('π')">π</button>
                </div>
                <div class="keypad-row">
                    <button class="btn function" onclick="handleScientific('x²')">x²</button>
                    <button class="btn function" onclick="handleScientific('xⁿ')">xⁿ</button>
                    <button class="btn function" onclick="handleScientific('√')">√</button>
                    <button class="btn function" onclick="handleScientific('ln')">ln</button>
                    <button class="btn function" onclick="handleScientific('log')">log</button>
                </div>
                <div class="keypad-row">
                    <button class="btn function" onclick="handleScientific('(')">(</button>
                    <button class="btn function" onclick="handleScientific(')')">)</button>
                    <button class="btn function" onclick="handleScientific('1/x')">1/x</button>
                    <button class="btn function" onclick="handleScientific('e')">e</button>
                    <button class="btn function" onclick="handleScientific('n!')">n!</button>
                </div>
            </div>

            <!-- 标准键盘 -->
            <div class="keypad">
                <div class="keypad-row">
                    <button class="btn function settings-btn" onclick="toggleSound()" id="soundBtn">🔊</button>
                    <button class="btn function" onclick="clearAll()">AC</button>
                    <button class="btn function" onclick="deleteLast()">⌫</button>
                    <button class="btn operator" onclick="handleOperator('/')">÷</button>
                </div>
                <div class="keypad-row">
                    <button class="btn number" onclick="appendNumber('7')">7</button>
                    <button class="btn number" onclick="appendNumber('8')">8</button>
                    <button class="btn number" onclick="appendNumber('9')">9</button>
                    <button class="btn operator" onclick="handleOperator('*')">×</button>
                </div>
                <div class="keypad-row">
                    <button class="btn number" onclick="appendNumber('4')">4</button>
                    <button class="btn number" onclick="appendNumber('5')">5</button>
                    <button class="btn number" onclick="appendNumber('6')">6</button>
                    <button class="btn operator" onclick="handleOperator('-')">−</button>
                </div>
                <div class="keypad-row">
                    <button class="btn number" onclick="appendNumber('1')">1</button>
                    <button class="btn number" onclick="appendNumber('2')">2</button>
                    <button class="btn number" onclick="appendNumber('3')">3</button>
                    <button class="btn operator" onclick="handleOperator('+')">+</button>
                </div>
                <div class="keypad-row">
                    <button class="btn number zero" onclick="appendNumber('0')">0</button>
                    <button class="btn number" onclick="appendNumber('.')">.</button>
                    <button class="btn operator" onclick="calculate()">=</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 反馈提示 -->
    <div class="feedback-toast" id="feedbackToast"></div>

    <script>
        // 计算器状态
        let currentOperand = '0';
        let previousOperand = '';
        let operation = null;
        let shouldResetScreen = false;
        let isDegreeMode = true;
        let soundEnabled = true;
        let history = JSON.parse(localStorage.getItem('calculatorHistory')) || [];

        // DOM 元素
        const currentOperandElement = document.getElementById('currentOperand');
        const previousOperandElement = document.getElementById('previousOperand');
        const degRadIndicator = document.getElementById('degRadIndicator');
        const degRadBtn = document.getElementById('degRadBtn');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');
        const soundBtn = document.getElementById('soundBtn');
        const feedbackToast = document.getElementById('feedbackToast');

        // 音频上下文（用于按键音）
        let audioContext = null;

        // 初始化
        updateHistoryDisplay();
        initAudio();

        // 初始化音频上下文（需要用户交互后才能使用）
        function initAudio() {
            document.addEventListener('click', () => {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }, { once: true });
        }

        // 播放按键音
        function playClickSound() {
            if (!soundEnabled || !audioContext) return;

            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // 短促的点击音
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.05);
            } catch (e) {
                console.log('Audio play failed:', e);
            }
        }

        // 震动反馈
        function vibrate() {
            if (navigator.vibrate) {
                navigator.vibrate(10); // 短震动 10ms
            }
        }

        // 按键反馈
        function buttonFeedback() {
            vibrate();
            playClickSound();
        }

        // 显示提示
        function showToast(message) {
            feedbackToast.textContent = message;
            feedbackToast.classList.add('show');
            setTimeout(() => {
                feedbackToast.classList.remove('show');
            }, 1500);
        }

        // 切换声音
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
            showToast(soundEnabled ? '声音已开启' : '声音已关闭');
            if (soundEnabled && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // 更新显示
        function updateDisplay() {
            currentOperandElement.textContent = formatNumber(currentOperand);
            if (operation != null) {
                previousOperandElement.textContent = `${formatNumber(previousOperand)} ${getOperatorSymbol(operation)}`;
            } else {
                previousOperandElement.textContent = previousOperand;
            }
        }

        // 格式化数字显示
        function formatNumber(number) {
            if (number === '') return '';
            const num = parseFloat(number);
            if (isNaN(num)) return number;
            if (num === 0) return '0';

            if (Math.abs(num) > 999999999999 || (Math.abs(num) < 0.000001 && num !== 0)) {
                return num.toExponential(6);
            }

            let str = num.toString();
            if (str.length > 12) {
                str = num.toPrecision(12);
            }
            return str;
        }

        // 获取运算符符号
        function getOperatorSymbol(op) {
            switch(op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                case '^': return '^';
                default: return op;
            }
        }

        // 追加数字
        function appendNumber(number) {
            buttonFeedback();
            if (shouldResetScreen) {
                currentOperand = number === '.' ? '0.' : number;
                shouldResetScreen = false;
            } else {
                if (number === '.' && currentOperand.includes('.')) return;
                if (currentOperand === '0' && number !== '.') {
                    currentOperand = number;
                } else {
                    currentOperand += number;
                }
            }
            updateDisplay();
        }

        // 处理运算符
        function handleOperator(op) {
            buttonFeedback();
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                calculate();
            }
            operation = op;
            previousOperand = currentOperand;
            shouldResetScreen = true;
            updateDisplay();

            document.querySelectorAll('.btn.operator').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // 计算
        function calculate() {
            buttonFeedback();
            if (operation === null || previousOperand === '' || currentOperand === '') return;

            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);

            switch(operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '*':
                    computation = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        showToast('不能除以零');
                        return;
                    }
                    computation = prev / current;
                    break;
                case '^':
                    computation = Math.pow(prev, current);
                    break;
                default:
                    return;
            }

            const expression = `${formatNumber(previousOperand)} ${getOperatorSymbol(operation)} ${formatNumber(currentOperand)}`;
            addToHistory(expression, computation);

            currentOperand = computation.toString();
            operation = null;
            previousOperand = '';
            shouldResetScreen = true;
            updateDisplay();

            document.querySelectorAll('.btn.operator').forEach(btn => btn.classList.remove('active'));
        }

        // 科学计算
        function handleScientific(func) {
            buttonFeedback();
            let value = parseFloat(currentOperand);
            let result;
            let expression;

            switch(func) {
                case 'sin':
                    expression = `sin(${currentOperand})`;
                    result = isDegreeMode ? Math.sin(value * Math.PI / 180) : Math.sin(value);
                    break;
                case 'cos':
                    expression = `cos(${currentOperand})`;
                    result = isDegreeMode ? Math.cos(value * Math.PI / 180) : Math.cos(value);
                    break;
                case 'tan':
                    expression = `tan(${currentOperand})`;
                    result = isDegreeMode ? Math.tan(value * Math.PI / 180) : Math.tan(value);
                    break;
                case '√':
                    if (value < 0) {
                        showToast('不能对负数开平方');
                        return;
                    }
                    expression = `√(${currentOperand})`;
                    result = Math.sqrt(value);
                    break;
                case 'x²':
                    expression = `(${currentOperand})²`;
                    result = Math.pow(value, 2);
                    break;
                case 'xⁿ':
                    handleOperator('^');
                    return;
                case 'ln':
                    if (value <= 0) {
                        showToast('ln 的参数必须大于0');
                        return;
                    }
                    expression = `ln(${currentOperand})`;
                    result = Math.log(value);
                    break;
                case 'log':
                    if (value <= 0) {
                        showToast('log 的参数必须大于0');
                        return;
                    }
                    expression = `log(${currentOperand})`;
                    result = Math.log10(value);
                    break;
                case '1/x':
                    if (value === 0) {
                        showToast('不能除以零');
                        return;
                    }
                    expression = `1/(${currentOperand})`;
                    result = 1 / value;
                    break;
                case 'n!':
                    if (value < 0 || !Number.isInteger(value)) {
                        showToast('阶乘只适用于非负整数');
                        return;
                    }
                    expression = `(${currentOperand})!`;
                    result = factorial(value);
                    break;
                case 'π':
                    result = Math.PI;
                    expression = 'π';
                    break;
                case 'e':
                    result = Math.E;
                    expression = 'e';
                    break;
                case '(':
                    currentOperand = currentOperand === '0' ? '(' : currentOperand + '(';
                    updateDisplay();
                    return;
                case ')':
                    currentOperand += ')';
                    updateDisplay();
                    return;
                default:
                    return;
            }

            if (func !== '(' && func !== ')') {
                addToHistory(expression, result);
                currentOperand = result.toString();
                shouldResetScreen = true;
                updateDisplay();
            }
        }

        // 阶乘计算
        function factorial(n) {
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        // 切换角度/弧度
        function toggleDegRad() {
            buttonFeedback();
            isDegreeMode = !isDegreeMode;
            const text = isDegreeMode ? 'DEG' : 'RAD';
            degRadBtn.textContent = text;
            degRadIndicator.textContent = text;
            degRadBtn.classList.toggle('active', isDegreeMode);
            showToast(isDegreeMode ? '角度模式' : '弧度模式');
        }

        // 清除所有
        function clearAll() {
            buttonFeedback();
            currentOperand = '0';
            previousOperand = '';
            operation = null;
            shouldResetScreen = false;
            document.querySelectorAll('.btn.operator').forEach(btn => btn.classList.remove('active'));
            updateDisplay();
        }

        // 删除最后一位
        function deleteLast() {
            buttonFeedback();
            if (shouldResetScreen) return;
            if (currentOperand.length === 1 || (currentOperand.length === 2 && currentOperand[0] === '-')) {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        // 切换历史面板
        function toggleHistory() {
            buttonFeedback();
            historyPanel.classList.toggle('show');
            if (historyPanel.classList.contains('show')) {
                updateHistoryDisplay();
            }
        }

        // 添加到历史记录
        function addToHistory(expression, result) {
            const item = {
                expression: expression,
                result: result,
                timestamp: new Date().toISOString()
            };
            history.unshift(item);
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            localStorage.setItem('calculatorHistory', JSON.stringify(history));
        }

        // 更新历史显示
        function updateHistoryDisplay() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">暂无计算历史</div>';
                return;
            }

            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="useHistory(${index})">
                    <div class="history-expr">${item.expression} =</div>
                    <div class="history-result">${formatNumber(item.result.toString())}</div>
                </div>
            `).join('');
        }

        // 清除历史
        function clearHistory() {
            buttonFeedback();
            if (confirm('确定要清除所有计算历史吗？')) {
                history = [];
                localStorage.removeItem('calculatorHistory');
                updateHistoryDisplay();
            }
        }

        // 使用历史记录
        function useHistory(index) {
            buttonFeedback();
            currentOperand = history[index].result.toString();
            shouldResetScreen = true;
            updateDisplay();
            toggleHistory();
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') { buttonFeedback(); appendNumber(e.key); }
            else if (e.key === '.') { buttonFeedback(); appendNumber('.'); }
            else if (e.key === '=' || e.key === 'Enter') { buttonFeedback(); calculate(); }
            else if (e.key === 'Backspace') { buttonFeedback(); deleteLast(); }
            else if (e.key === 'Escape') { buttonFeedback(); clearAll(); }
            else if (e.key === '+') { buttonFeedback(); handleOperator('+'); }
            else if (e.key === '-') { buttonFeedback(); handleOperator('-'); }
            else if (e.key === '*') { buttonFeedback(); handleOperator('*'); }
            else if (e.key === '/') { buttonFeedback(); handleOperator('/'); }
        });

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
